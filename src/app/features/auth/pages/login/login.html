<div class="login-wrapper">

  <!-- PAINEL ESQUERDO -->
  <div class="left-panel">
    <div class="geo-lines">
      <svg viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <line x1="0" y1="200" x2="600" y2="600" stroke="#c9a227" stroke-width="0.8"/>
        <line x1="0" y1="400" x2="600" y2="200" stroke="#c9a227" stroke-width="0.5"/>
        <line x1="150" y1="0" x2="450" y2="800" stroke="#c9a227" stroke-width="0.6"/>
        <circle cx="300" cy="400" r="180" fill="none" stroke="#c9a227" stroke-width="0.6"/>
        <circle cx="300" cy="400" r="280" fill="none" stroke="#c9a227" stroke-width="0.4"/>
        <polygon points="300,120 520,560 80,560" fill="none" stroke="#c9a227" stroke-width="0.5"/>
      </svg>
    </div>

    <div class="brand-block">
      <svg class="robot-icon" viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="60" y1="18" x2="60" y2="4" stroke="#c9a227" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="60" cy="3" r="3" fill="#c9a227"/>
        <line x1="60" y1="10" x2="44" y2="2" stroke="#c9a227" stroke-width="2" stroke-linecap="round"/>
        <circle cx="43" cy="1.5" r="2.5" fill="#c9a227"/>
        <line x1="60" y1="10" x2="76" y2="2" stroke="#c9a227" stroke-width="2" stroke-linecap="round"/>
        <circle cx="77" cy="1.5" r="2.5" fill="#c9a227"/>
        <rect x="36" y="18" width="48" height="40" rx="12" fill="none" stroke="#c9a227" stroke-width="2.5"/>
        <circle cx="50" cy="35" r="5" fill="#c9a227"/>
        <circle cx="70" cy="35" r="5" fill="#c9a227"/>
        <circle cx="51.5" cy="33.5" r="1.5" fill="#0f1e3b"/>
        <circle cx="71.5" cy="33.5" r="1.5" fill="#0f1e3b"/>
        <path d="M50 46 Q60 53 70 46" stroke="#c9a227" stroke-width="2" fill="none" stroke-linecap="round"/>
        <rect x="28" y="28" width="8" height="16" rx="4" fill="none" stroke="#c9a227" stroke-width="2"/>
        <rect x="84" y="28" width="8" height="16" rx="4" fill="none" stroke="#c9a227" stroke-width="2"/>
        <line x1="60" y1="58" x2="60" y2="74" stroke="#c9a227" stroke-width="2.5"/>
        <line x1="28" y1="74" x2="92" y2="74" stroke="#c9a227" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="36" y1="74" x2="30" y2="90" stroke="#c9a227" stroke-width="1.8"/>
        <line x1="44" y1="74" x2="50" y2="90" stroke="#c9a227" stroke-width="1.8"/>
        <line x1="76" y1="74" x2="70" y2="90" stroke="#c9a227" stroke-width="1.8"/>
        <line x1="84" y1="74" x2="90" y2="90" stroke="#c9a227" stroke-width="1.8"/>
        <path d="M28 90 Q40 98 52 90" stroke="#c9a227" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M68 90 Q80 98 92 90" stroke="#c9a227" stroke-width="2" fill="none" stroke-linecap="round"/>
        <line x1="52" y1="110" x2="68" y2="110" stroke="#c9a227" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="60" y1="74" x2="60" y2="110" stroke="#c9a227" stroke-width="2.5"/>
        <line x1="44" y1="118" x2="76" y2="118" stroke="#c9a227" stroke-width="3" stroke-linecap="round"/>
      </svg>

      <h1 class="brand-title">MATIA</h1>
      <div class="gold-line"></div>
      <p class="brand-tagline">Sua fonte confiável de leis<br>e decretos de Mato Grosso</p>
    </div>
  </div>

  <!-- PAINEL DIREITO -->
  <div class="right-panel">
    <div class="login-card">

      <div class="card-header">
        <span class="eyebrow">Acesso ao sistema</span>
        <h2 class="card-title">Bem-vindo de volta</h2>
      </div>

      <!-- EMAIL -->
      <div class="field">
        <label class="field-label">E-mail</label>
        <div class="p-input-icon-left input-wrap">
          <i class="pi pi-envelope"></i>
          <input pInputText type="email" placeholder="seu@email.com.br" class="w-full custom-input" autocomplete="email"/>
        </div>
      </div>

      <!-- SENHA -->
      <div class="field">
        <label class="field-label">Senha</label>
        <div class="p-input-icon-left input-wrap">
          <i class="pi pi-lock"></i>
          <input pInputText type="password" placeholder="••••••••••" class="w-full custom-input" autocomplete="current-password"/>
        </div>
      </div>

      <!-- ESQUECEU A SENHA -->
      <div class="forgot-row">
        <button pButton type="button" class="p-button-text forgot-btn">Esqueceu a senha?</button>
      </div>

      <!-- ENTRAR -->
      <p-button
        label="ENTRAR"
        [fluid]="true"
        styleClass="btn-login"
        (onClick)="onLogin()"/>

      <!-- DIVIDER -->
      <div class="divider">
        <span>ou</span>
      </div>

      <!-- CADASTRAR -->
      <p-button
        label="CRIAR NOVA CONTA"
        [fluid]="true"
        styleClass="btn-register"
        [outlined]="true"/>

    </div>
  </div>
</div>
